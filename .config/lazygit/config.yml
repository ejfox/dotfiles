# Light Vulpes 2.0 — Risograph Editorial
# Derived from: vulpes-theme-lab/themes/light-vulpes-v2/palette.toml
# Hierarchy: L1 sacred · L5 fade · accent rare

gui:
  theme:
    # Borders ──────────────────────────────────────
    activeBorderColor: # L3 — only the focused panel
      - '#a8003c'
      - bold
    inactiveBorderColor: # L5 — recede (but readable)
      - '#6a5d60'
    searchingActiveBorderColor:
      - '#d6004c'
      - bold
    # Text ─────────────────────────────────────────
    defaultFgColor: # L2 — primary content
      - '#1a0f14'
    optionsTextColor: # L4 — footer is supporting, not loud
      - '#3d2a30'
    unstagedChangesColor: # L3 — state moment
      - '#a8003c'
    # Selection ────────────────────────────────────
    # Cream, not pink. Pink selection competes with pink branding.
    selectedLineBgColor:                                # warm tan step — clearly visible
      - '#e0d4be'
    selectedRangeBgColor:
      - '#e0d4be'
    inactiveViewSelectedLineBgColor:                    # one notch quieter
      - '#d8cbb0'
    # Cherry-pick / marked commit (state on accent bg) ─
    cherryPickedCommitBgColor:
      - '#a8003c'
    cherryPickedCommitFgColor:
      - '#faf6ee'
    markedBaseCommitBgColor:
      - '#000000'
    markedBaseCommitFgColor:
      - '#faf6ee'
  commitLength:
    show: true
  showFileTree: true
  showListFooter: true
  showRandomTip: true
  showBranchCommitHash: false
  showBottomLine: true
  showCommandLog: true
  # Author colors ────────────────────────────────
  # Editorial byline: your own initials at L4 (slightly louder, "mine"),
  # everyone else at L5 (fade — eye scans past these).
  authorColors:
    "EF": '#3d2a30'   # L4 — yours
    "EJ": '#3d2a30'   # L4 — yours (older commits)
    "*":  '#6a5d60'   # L5 — everyone else
  # Branch colors ────────────────────────────────
  # main = L1 (loudest). Others step down. Catchall * pins unmatched
  # branches to L4 muted instead of falling through to ANSI defaults.
  branchColors:
    "main": '#000000' # L1
    "master": '#000000' # L1
    "develop": '#1a0f14' # L2
    "release/*": '#1a0f14' # L2
    "feature/*": '#a8003c' # L3 (state — work in progress)
    "fix/*": '#a8003c' # L3
    "wip/*": '#3d2a30' # L4
    "staging": '#3d2a30' # L4
    "*": '#3d2a30' # L4 — everything unmatched
# Pipe diff output through delta so the [delta "light-vulpes"] feature in
# ~/.gitconfig provides paper-tinted bg colors (paper-pink / paper-green
# washes with accent text). --color-only preserves lazygit's panel layout.
git:
  paging:
    colorArg: always
    pager: delta --features="light-vulpes lazygit" --paging=never --color-only --keep-plus-minus-markers

customCommands:
  - key: "a"
    context: "files"
    description: "AI commit (fzf + Claude)"
    command: 'MSG=$(ai-commit) && git commit -m "$MSG"'
    output: terminal
