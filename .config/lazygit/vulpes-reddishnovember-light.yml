# Light Vulpes 2.0 — Risograph Editorial
# Canonical light snapshot. Derived from:
#   ~/code/VULPES/vulpes-theme-lab/themes/light-vulpes-v2/palette.toml

gui:
  theme:
    activeBorderColor:
      - '#a8003c'
      - bold
    inactiveBorderColor:
      - '#6a5d60'
    searchingActiveBorderColor:
      - '#d6004c'
      - bold
    defaultFgColor:
      - '#1a0f14'
    optionsTextColor:
      - '#3d2a30'
    unstagedChangesColor:
      - '#a8003c'
    selectedLineBgColor:
      - '#e0d4be'
    selectedRangeBgColor:
      - '#e0d4be'
    inactiveViewSelectedLineBgColor:
      - '#d8cbb0'
    cherryPickedCommitBgColor:
      - '#a8003c'
    cherryPickedCommitFgColor:
      - '#faf6ee'
    markedBaseCommitBgColor:
      - '#000000'
    markedBaseCommitFgColor:
      - '#faf6ee'

  authorColors:
    "EF": '#3d2a30'
    "EJ": '#3d2a30'
    "*":  '#6a5d60'

  branchColors:
    "main":      '#000000'
    "master":    '#000000'
    "develop":   '#1a0f14'
    "release/*": '#1a0f14'
    "feature/*": '#a8003c'
    "fix/*":     '#a8003c'
    "wip/*":     '#3d2a30'
    "staging":   '#3d2a30'
    "*":         '#3d2a30'
