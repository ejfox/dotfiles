# vulpes-reddishnovember-light — Yazi Theme
# Light Vulpes 2.0 — Risograph Editorial
# Direct translation of vulpes-reddishnovember-dark.toml, preserving roles:
#   • brand pink (#a8003c) replaces #ff0055 (darkened for cream)
#   • cream paper (#f4ede4) replaces #000000 OLED black
#   • bg_alt cream (#ebe2d6) replaces #2d1a22 deep wine
#   • muted vulpes (#7a3055) replaces #d4a5bf rose-grey
#   • ink fade (#6a5d60) replaces #73264a chrome wine
# Reference: ~/code/VULPES/vulpes-theme-lab/themes/light-vulpes-v2/

[mgr]
cwd = { fg = "#a8003c" }
hovered = { fg = "#ffffff", bg = "#a8003c" }
preview_hovered = { underline = true }

# Find
find_keyword = { fg = "#9e3050", italic = true }
find_position = { fg = "#a8003c", bg = "reset", italic = true }

# Markers
marker_selected = { fg = "#7a3055", bg = "#7a3055" }
marker_copied = { fg = "#9e3050", bg = "#9e3050" }
marker_cut = { fg = "#a8003c", bg = "#a8003c" }

# Border (chrome — fade tier, NOT brand)
border_symbol = "│"
border_style = { fg = "#ebe2d6" }

syntect_theme = ""

[mode]
normal_main = { fg = "#ffffff", bg = "#a8003c", bold = true }
normal_alt = { fg = "#a8003c", bg = "#ebe2d6" }
select_main = { fg = "#ffffff", bg = "#7a3055", bold = true }
select_alt = { fg = "#7a3055", bg = "#ebe2d6" }
unset_main = { fg = "#ffffff", bg = "#9e3050", bold = true }
unset_alt = { fg = "#9e3050", bg = "#ebe2d6" }

[status]
overall = { fg = "#1a0f14", bg = "#ffffff" }
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }

# Permissions
perm_type = { fg = "#7a3055" }
perm_read = { fg = "#9e3050" }
perm_write = { fg = "#a8003c" }
perm_exec = { fg = "#a8003c" }
perm_sep = { fg = "#6a5d60" }

# Progress
progress_label = { fg = "#1a0f14", bold = true }
progress_normal = { fg = "#a8003c", bg = "#ebe2d6" }
progress_error = { fg = "#9e3050", bg = "#ebe2d6" }

[tabs]
active = { fg = "#ffffff", bg = "#a8003c" }
inactive = { fg = "#6a5d60", bg = "#ebe2d6" }

[input]
border = { fg = "#a8003c" }
title = {}
value = {}
selected = { reversed = true }

[select]
border = { fg = "#a8003c" }
active = { fg = "#a8003c" }
inactive = {}

[tasks]
border = { fg = "#a8003c" }
title = {}
hovered = { underline = true }

[which]
mask = { bg = "#ebe2d6" }
cand = { fg = "#a8003c" }
rest = { fg = "#6a5d60" }
desc = { fg = "#1a0f14" }
separator = "  "
separator_style = { fg = "#6a5d60" }

[help]
on = { fg = "#7a3055" }
run = { fg = "#a8003c" }
desc = { fg = "#6a5d60" }
hovered = { bg = "#ebe2d6", bold = true }
footer = { fg = "#6a5d60", bg = "#ebe2d6" }

# Git status — chartreuse + burgundy duo (mirrors lazygit/delta/nvim)
[git]
modified = { fg = "#8a5530" }    # sepia (warn family)
added = { fg = "#5d7a1f" }       # darkened chartreuse (matches diff_add)
deleted = { fg = "#9e3050" }     # dusty burgundy (matches diff_delete)
ignored = { fg = "#a89a9d" }     # quiet (chrome-tier)
untracked = { fg = "#1a5e6e" }   # deep teal (the inverse-hue accent)

[filetype]
rules = [
	# Images
	{ mime = "image/*", fg = "#a8003c" },

	# Videos/Audio
	{ mime = "video/*", fg = "#9e3050" },
	{ mime = "audio/*", fg = "#9e3050" },

	# Archives
	{ mime = "application/zip", fg = "#9e3050" },
	{ mime = "application/gzip", fg = "#9e3050" },
	{ mime = "application/x-tar", fg = "#9e3050" },
	{ mime = "application/x-bzip", fg = "#9e3050" },
	{ mime = "application/x-bzip2", fg = "#9e3050" },
	{ mime = "application/x-7z-compressed", fg = "#9e3050" },
	{ mime = "application/x-rar", fg = "#9e3050" },

	# Documents
	{ mime = "application/pdf", fg = "#a8003c" },

	# Fallback
	{ name = "*", fg = "#1a0f14" },
	{ name = "*/", fg = "#a8003c" }
]
